# キャリコンNOW掲示板: 厚労省RSSから関連ニュースを毎日自動で取り込む
name: kyarikon-now-update
on:
  schedule:
    - cron: "30 21 * * *" # 毎日 6:30 (日本時間)
  workflow_dispatch: {}   # 手動実行も可能
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ニュースを取得してnews-feed.jsonを更新
        run: node scripts/fetch-news.mjs
      - name: 変更があればコミット
        run: |
          git config user.name "kyarikon-now-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news-feed.json
          git diff --cached --quiet || (git commit -m "キャリコンNOW: ニュース自動更新" && git push)
